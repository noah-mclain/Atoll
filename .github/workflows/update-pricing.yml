name: Update LLM Pricing Data

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-pricing:
    # Needs the APP_ID / APP_PRIVATE_KEY secrets, which only exist on the
    # canonical repository — skip on forks instead of failing every night.
    if: github.repository == 'Ebullioscopic/Atoll'
    runs-on: ubuntu-latest

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Fetch and update pricing
        run: |
          # Fetch all models from OpenRouter
          curl -s https://openrouter.ai/api/v1/models > all_models.json

          TARGET_MODELS=("anthropic/claude-3-opus" "anthropic/claude-3-5-sonnet" "anthropic/claude-3-haiku" "openai/gpt-5-preview")

          echo "{" > pricing_new.json
          echo "  \"models\": [" >> pricing_new.json

          first=true
          for model_id in "${TARGET_MODELS[@]}"; do
            if [ "$first" = false ]; then echo "," >> pricing_new.json; fi

            model_data=$(jq -c --arg ID "$model_id" '.data[] | select(.id == $ID)' all_models.json)

            name=$(echo "$model_data" | jq -r '.name')
            prompt_price=$(echo "$model_data" | jq -r '.pricing.prompt')
            completion_price=$(echo "$model_data" | jq -r '.pricing.completion')

            echo "    {" >> pricing_new.json
            echo "      \"id\": \"$model_id\"," >> pricing_new.json
            echo "      \"name\": \"$name\"," >> pricing_new.json
            echo "      \"pricing\": {" >> pricing_new.json
            echo "        \"prompt\": \"$prompt_price\"," >> pricing_new.json
            echo "        \"completion\": \"$completion_price\"" >> pricing_new.json
            echo "      }" >> pricing_new.json
            echo "    }" >> pricing_new.json

            first=false
          done

          echo "  ]," >> pricing_new.json
          echo "  \"last_updated\": \"$(date -u +"%Y-%m-%dT%H:%M:%SZ")\"" >> pricing_new.json
          echo "}" >> pricing_new.json

          mkdir -p DynamicIsland/managers/LLMUsage
          mv pricing_new.json DynamicIsland/managers/LLMUsage/pricing.json

          rm all_models.json

      - name: Commit and push changes
        run: |
          git config user.name "Atoll-XML-Updater[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add DynamicIsland/managers/LLMUsage/pricing.json

          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "chore: update llm pricing data [skip ci]"

          git push origin HEAD:main